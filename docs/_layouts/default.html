<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    /* Reset & Deep Dark Base Palette */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      line-height: 1.7; 
      max-width: 800px; 
      margin: 0 auto; 
      padding: 0 30px; 
      color: #e0e0e0; 
      background-color: #151515; /* Match Arpit's signature dark background */
      -webkit-font-smoothing: antialiased;
    }

    /* Fixed Content & Navigation Links */
    a { color: #ffffff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Layout Header Match - Left and Right Alignment */
    header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 30px 0;
      border-bottom: 1px solid #2d2d2d; 
      margin-bottom: 50px;
    }
    .site-title { 
      font-family: Georgia, serif; /* Clean serif title face */
      font-size: 1.35rem; 
      font-weight: 700; 
      font-style: italic;
    }
    
    /* Right Aligned Navigation Element */
    nav { display: flex; gap: 20px; }
    nav a { 
      font-size: 0.88rem; 
      font-weight: 600; 
      color: #cccccc; 
    }
    nav a:hover { color: #ffffff; text-decoration: none; }

    /* Detailed Profile Body Elements */
    main { padding-bottom: 60px; }
    .hero-greeting {
      font-family: Georgia, serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 24px;
    }
    .bio-text p {
      font-size: 1.05rem;
      color: #b5b5b5;
      margin-bottom: 20px;
      letter-spacing: 0.1px;
    }
    .tech-stack-tags {
      font-family: monospace;
      font-size: 0.9rem;
      color: #888888;
      margin-top: 10px;
      margin-bottom: 40px;
    }

    /* Section Typography Overrides */
    h2 { font-size: 1.4rem; color: #ffffff; margin-top: 50px; margin-bottom: 20px; font-family: Georgia, serif; }
    .item-list { list-style: none; }
    .item-row { display: flex; align-items: baseline; padding: 8px 0; border-bottom: 1px dashed #262626; font-size: 0.95rem; }
    .item-row:last-child { border-bottom: none; }
    .item-meta { font-family: monospace; color: #666666; min-width: 120px; flex-shrink: 0; }
    .item-extra { color: #777777; font-size: 0.9rem; margin-left: 6px; }
  </style>
</head>
<body>

  <header>
    <div class="site-title">
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </div>
    <nav>
      <a href="{{ '/#blogs' | relative_url }}">Blogs</a>
      <a href="{{ '/#papershelf' | relative_url }}">Papershelf</a>
      <a href="{{ '/#bookshelf' | relative_url }}">Bookshelf</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

</body>
</html>
