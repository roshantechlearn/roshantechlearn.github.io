<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <!-- 1. PASTE THE GOOGLE FONTS LINK HERE -->
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- 1. Place the Google Fonts link right above your <style> tag -->
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* Global Base - Updated to Inter Font Family */
    body { 
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      line-height: 1.7; 
      max-width: 800px; 
      margin: 0 auto; 
      padding: 0 30px; 
      color: #e0e0e0; 
      background-color: #151515; /* Match Arpit's signature dark background */
      -webkit-font-smoothing: antialiased;
    }

    /* Fixed Content & Navigation Links */
    a { color: #ffffff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Layout Header Match - Left and Right Alignment */
    header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 30px 0;
      border-bottom: 1px solid #2d2d2d; 
      margin-bottom: 50px;
    }
    
        /* Layout Header Match - Left and Right Alignment */
    header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 30px 0;
      border-bottom: 1px solid #2d2d2d; 
      margin-bottom: 50px;
    }
    
    /* Site Title Branding */
    .site-title { 
      font-family: "Inter", sans-serif;
      font-size: 1.25rem; 
      font-weight: 800; /* Extra bold look */
      letter-spacing: -0.03em; 
      color: #ffffff;
      text-decoration: none;
    }
    .site-title:hover { text-decoration: none; }
    
    /* Right Aligned Navigation Elements */
    nav { 
      display: flex; 
      gap: 24px; 
      align-items: center; 
    }
    
    nav a { 
      font-family: "Inter", sans-serif;
      font-size: 0.95rem; 
      font-weight: 700; /* Bold links to match Arpit's focus layout */
      color: #cccccc; 
      text-decoration: none;
      padding-bottom: 4px; /* Creates spacing above the underline indicator */
      border-bottom: 2px solid transparent; /* Hidden by default */
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    
    /* Arpit's Signature Classic Underscore Action on Hover */
    nav a:hover { 
      color: #ffffff; 
      text-decoration: none; 
      border-bottom-color: #ffffff; /* Shows a clean white border line */
    }


    /* Detailed Profile Body Elements */
    main { padding-bottom: 60px; }
    
    /* Hero Title - Swapped Georgia for modern Inter header */
    .hero-greeting {
      font-family: "Inter", sans-serif;
      font-size: 2.2rem;
      font-weight: 800; /* Extra bold for emphasis */
      letter-spacing: -0.03em;
      color: #ffffff;
      margin-bottom: 24px;
    }
    .bio-text p {
      font-size: 1.05rem;
      color: #b5b5b5;
      margin-bottom: 20px;
      letter-spacing: 0.01em; /* Micro-tracking for high legibility */
    }
    .tech-stack-tags {
      font-family: monospace;
      font-size: 0.9rem;
      color: #888888;
      margin-top: 10px;
      margin-bottom: 40px;
    }

    /* Section Typography Overrides - Applied to Inter */
    h2 { 
      font-family: "Inter", sans-serif;
      font-size: 1.35rem; 
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff; 
      margin-top: 50px; 
      margin-bottom: 20px; 
    }
    
    .item-list { list-style: none; }
    .item-row { display: flex; align-items: baseline; padding: 8px 0; border-bottom: 1px dashed #262626; font-size: 0.95rem; }
    .item-row:last-child { border-bottom: none; }
    .item-meta { font-family: monospace; color: #666666; min-width: 120px; flex-shrink: 0; }
    .item-extra { color: #777777; font-size: 0.9rem; margin-left: 6px; }

    /* SWUP Transition Rule Support */
    .transition-fade {
      transition: 0.3s ease-in-out;
      opacity: 1;
    }
    html.is-changing .transition-fade {
      opacity: 0;
    }
  </style>

</head>
<body>

  <header>
    <div class="site-title">
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </div>
    <nav>
      <a href="{{ '/#blogs' | relative_url }}">Blogs</a>
      <a href="{{ '/#papershelf' | relative_url }}">Papershelf</a>
      <a href="{{ '/#bookshelf' | relative_url }}">Bookshelf</a>
    </nav>
  </header>

  


  <main>
    {{ content }}
  </main>

</body>
</html>
